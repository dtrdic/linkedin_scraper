<!DOCTYPE html>
<html>
<head>
  <title>LinkedIn Lead Finder</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input[type="text"] { width: 300px; padding: 5px; }
    button { padding: 5px 10px; margin-left: 5px; }
    ul { list-style: none; padding-left: 0; }
    .lead-card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 5px; }
    .hot-lead { border-color: #ff4500; background-color: #fff2f0; }
    #progressBar { width: 100%; height: 20px; background: #eee; margin: 10px 0; border-radius: 10px; overflow: hidden; }
    #progressFill { height: 100%; width: 0%; background: #4caf50; transition: width 0.3s; }
  </style>
</head>
<body>

<h1>LinkedIn Codemagic Lead Finder</h1>

<div>
  <input type="text" id="queryInput" placeholder="Add search query">
  <button id="addQueryBtn">Add</button>
</div>

<ul id="queriesList"></ul>

<div>
  <button id="startBtn">Start Scraping</button>
  <button id="stopBtn">Stop</button>
</div>

<div id="progressBar">
  <div id="progressFill"></div>
</div>

<div id="status">Idle.</div>
<div id="leadCount"></div>
<div id="leadsContainer"></div>

<script>
let searchQueries = [];
let scraping = false;

const queryInput = document.getElementById('queryInput');
const queriesList = document.getElementById('queriesList');
const addQueryBtn = document.getElementById('addQueryBtn');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusDiv = document.getElementById('status');
const progressFill = document.getElementById('progressFill');
const leadsContainer = document.getElementById('leadsContainer');
const leadCount = document.getElementById('leadCount');

let progress = { running: false, currentQuery: '', completed: 0, total: 0, leadsFound: 0, hotLeads: 0 };

function renderQueries() {
  queriesList.innerHTML = '';
  searchQueries.forEach(q => {
    const li = document.createElement('li');
    li.textContent = q;
    queriesList.appendChild(li);
  });
}

addQueryBtn.addEventListener('click', () => {
  const val = queryInput.value.trim();
  if (val && !searchQueries.includes(val)) {
    searchQueries.push(val);
    renderQueries();
    queryInput.value = '';
  }
});

function renderLeads(leads) {
  leadsContainer.innerHTML = '';
  leadCount.textContent = `${leads.length} leads found (${leads.filter(l => l.hotLead).length} 🔥 hot)`;

  leads.sort((a,b)=>b.hotLead-a.hotLead).forEach(lead => {
    const div = document.createElement('div');
    div.className = 'lead-card';
    if (lead.hotLead) div.classList.add('hot-lead');

    div.innerHTML = `
      <div><strong>Author:</strong> ${lead.author || '(Unknown)'}</div>
      <div><strong>Company:</strong> ${lead.company || '-'}</div>
      <div><strong>Hot Lead:</strong> ${lead.hotLead ? "🔥 YES" : "No"}</div>
      <div><strong>Stack:</strong> ${lead.stack || '-'}</div>
      <div><strong>CI Tool:</strong> ${lead.ciTool || '-'}</div>
      <div><strong>Reason:</strong> ${lead.leadReason || '-'}</div>
      <div><strong>Post Preview:</strong> ${lead.postText ? lead.postText.substring(0,150) + (lead.postText.length>150 ? '...' : '') : '-'}</div>
      <div>
        <a href="${lead.profileUrl}" target="_blank">Open Profile</a>
        ${lead.postUrl ? `| <a href="${lead.postUrl}" target="_blank">Open Post</a>` : ''}
      </div>
    `;
    leadsContainer.appendChild(div);
  });
}

async function fetchProgress() {
  try {
    const res = await fetch('/progress');
    const data = await res.json();
    progress = data;

    const percent = progress.total ? Math.min(Math.round(progress.completed / progress.total * 100), 100) : 0;
    progressFill.style.width = percent + '%';

    statusDiv.textContent = progress.running
      ? `Scraping: ${progress.currentQuery} | ${progress.completed} scanned | ${progress.leadsFound} leads found (${progress.hotLeads} 🔥 hot)`
      : `Stopped. ${progress.completed} scanned. ${progress.leadsFound} leads found (${progress.hotLeads} 🔥 hot)`;

    if (progress.running) setTimeout(fetchProgress, 500);
  } catch(e) { console.error(e); }
}

startBtn.addEventListener('click', async () => {
  if (!searchQueries.length) { alert('Add at least one search query'); return; }
  if (scraping) return;

  scraping = true;
  progressFill.style.width = '0%';
  progress = { running: true, currentQuery: '', completed: 0, total: searchQueries.length * 100, leadsFound: 0, hotLeads: 0 };

  fetchProgress();

  try {
    const res = await fetch('/start-scraper', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ searchQueries })
    });
    const leads = await res.json();
    renderLeads(leads);
  } catch(e) { console.error(e); }
  finally {
    scraping = false;
    statusDiv.textContent = 'Stopped.';
    progressFill.style.width = '0%';
  }
});

stopBtn.addEventListener('click', async () => {
  if (!scraping) return;
  await fetch('/stop-scraper', { method: 'POST' });
  statusDiv.textContent = 'Stopping...';
});

renderQueries();
</script>

</body>
</html>
